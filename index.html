<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EventHub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="top">
    <h2>EventHub</h2>

    <nav id="nav">
      <a href="#home">Home</a>
      <a href="#events">Events</a>
      <a href="#booking">Book</a>
    </nav>

    <button id="hamburger">☰</button>
  </div>
</header>

<section id="home">
  <h1>Book Your Favourite Events</h1>
  <p>Movies, concerts and sports events available here</p>
  <a href="#events" class="btn">View Events</a>
</section>

<section id="events">
  <h2>Events</h2>

  <div class="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="movie">Movie</button>
    <button class="filter-btn" data-filter="concert">Concert</button>
    <button class="filter-btn" data-filter="sports">Sports</button>
  </div>

  <div id="event-grid" class="grid"></div>
</section>

<section id="booking">
  <h2>Book Ticket</h2>

  <form id="booking-form">
    <input type="text" id="name" placeholder="Your Name">
    <input type="email" id="email" placeholder="Email">
    
    <select id="event">
      <option value="">Select Event</option>
      <option value="avengers">Avengers</option>
      <option value="ar-rahman">AR Rahman</option>
      <option value="ipl">IPL</option>
    </select>

    <input type="number" id="tickets" placeholder="Tickets (1-10)">
    
    <button type="submit">Book Now</button>
  </form>
</section>

<footer>
  <p>© 2026 EventHub | Created by Arun</p>
</footer>

<div id="toast" class="toast">
  <span id="toast-msg"></span>
</div>

<script src="script.js"></script>
</body>
</html>
